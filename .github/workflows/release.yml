name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
    - name: Build release bundle
      run: make build
      
    - name: Verify build
      run: |
        bash -n uservin.sh
        bash uservin.sh --version
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Installation
          
          ### Quick install (one-liner):
          ```bash
          wget -qO- https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/uservin.sh | sudo bash
          ```
          
          ### Or download and run:
          ```bash
          wget https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/uservin.sh
          chmod +x uservin.sh
          sudo ./uservin.sh
          ```
          
          ### What's Changed
          See [CHANGELOG.md](CHANGELOG.md) for full details.
        files: |
          uservin.sh
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
