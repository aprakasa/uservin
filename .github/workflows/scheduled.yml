name: Scheduled Tests

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: scheduled-tests
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test (Ubuntu ${{ matrix.ubuntu-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        ubuntu-version: ["20.04", "22.04", "24.04"]
    container:
      image: ubuntu:${{ matrix.ubuntu-version }}
    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq git bash make

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run test suite
        run: |
          cd tests
          bash runner.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: ShellCheck
        uses: ./.github/actions/shellcheck
        with:
          severity: error

  notify:
    name: Notify on failure
    if: failure() && github.event_name == 'schedule'
    needs: [test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Create issue for failed scheduled run
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Scheduled test failure: ${date}`;
            const body = `## Scheduled Test Failure\n\n` +
              `**Date:** ${date}\n` +
              `**Run:** ${runUrl}\n` +
              `**Trigger:** ${context.eventName}\n\n` +
              `The scheduled weekly test run has failed. Please investigate.\n\n` +
              `> This issue was automatically created by the scheduled tests workflow.`;

            const existing = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: ['ci-failure', 'automated'],
              per_page: 5
            });

            for (const issue of existing.data) {
              if (issue.title.startsWith('Scheduled test failure:')) {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: issue.number,
                  body: `Another failure occurred on ${date}.\n${runUrl}`
                });
                return;
              }
            }

            await github.rest.issues.create({
              ...context.repo,
              title,
              body,
              labels: ['ci-failure', 'automated']
            });
