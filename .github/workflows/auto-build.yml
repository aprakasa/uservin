name: Auto Build

on:
  push:
    branches: [main, master]
    paths: ["lib/**", "build.sh", "Makefile"]

concurrency:
  group: auto-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    name: Verify source changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: make build

      - name: Verify syntax
        run: bash -n uservin.sh

      - name: ShellCheck
        uses: ./.github/actions/shellcheck
        with:
          severity: warning

  commit:
    name: Commit bundled script
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Git
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Build uservin.sh
        run: make build

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet uservin.sh; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to uservin.sh"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in uservin.sh"
          fi

      - name: Generate checksums
        if: steps.check.outputs.changed == 'true'
        run: |
          sha256sum uservin.sh > uservin.sh.sha256
          sha512sum uservin.sh > uservin.sh.sha512

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git add uservin.sh uservin.sh.sha256 uservin.sh.sha512
          COMMIT_MSG="chore(build): auto-update bundled uservin.sh"$'\n\n'"Triggered by commit ${GITHUB_SHA:0:8}"
          git commit -m "$COMMIT_MSG"
          git push
