# uservin Configuration File Example
# Copy this file to config.ini and customize for your needs

[system]
# Server hostname (letters, numbers, hyphens, and dots for FQDNs)
# Must not start or end with a hyphen
# Examples: myserver, srv.example.com
hostname = myserver

# System timezone (e.g., Asia/Jakarta, America/New_York, Europe/London)
# Use 'timedatectl list-timezones' to see available options
timezone = Asia/Jakarta

[user]
# Admin username for the new non-root user
# Must be 1-32 characters, lowercase letters, numbers, and underscores
# Must not start with a number or underscore
username = admin

# SSH public key for the admin user
# Must be a valid SSH key format (ssh-rsa, ssh-ed25519, ecdsa-sha2-nistp256, etc.)
# This key will be added to ~/.ssh/authorized_keys for the new user
ssh_key = ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDKlH8RhBhcM0fTl7x6QwEp8P/2/3oIexamplekey user@example.com

[ssh]
# SSH port (1-65535)
# Default is 22, but changing to a non-standard port improves security
# Recommended: 2222, 2200, 8022, or any port 1024-65535
# Avoid common service ports: 80, 443, 3306, 5432, 8080
port = 22

[updates]
# Enable automatic security updates
# When true, unattended-upgrades will be configured to install security updates automatically
# When false, manual updates are required
auto_updates = true

[performance]
# Enable swap file
# When true, creates a swap file based on available RAM
# When false, no swap is created
# Note: Not recommended for SSD storage due to wear
enable_swap = false

# Enable ZRAM
# When true, configures compressed RAM swap for better performance
# Recommended for systems with limited RAM
# Uses RAM compression instead of disk swap
enable_zram = true

# Enable automatic performance tuning
# When true, the script will auto-detect system specs and apply optimal settings
# When false, uses default settings
auto_detect = true

# Examples:
#
# Minimal VPS (1 CPU, 1GB RAM):
#   enable_swap = true
#   enable_zram = false
#   auto_detect = true
#
# Standard Server (2 CPU, 4GB RAM):
#   enable_swap = false
#   enable_zram = true
#   auto_detect = true
#
# High-Performance Server (4+ CPU, 8GB+ RAM):
#   enable_swap = false
#   enable_zram = false
#   auto_detect = true
